<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>将棋指導対局チケットジェネレーター</title>
    <!-- Tailwind CSS for UI styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for traditional Japanese feeling -->
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Shippori Mincho', serif;
            background-color: #f3f4f6;
        }

        /* A4 Page styling for preview */
        .a4-page {
            background: white;
            width: 210mm;
            height: 297mm;
            padding: 15mm 10mm;
            margin: 0 auto 10mm auto;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            box-sizing: border-box;
            position: relative;
            page-break-after: always;
        }

        /* Ticket styling */
        .ticket-container {
            width: 190mm;
            height: 51mm; /* 5 tickets fit perfectly in 297mm height with margins */
            border: 1.5px solid #2d2d2d;
            margin-bottom: 4mm;
            box-sizing: border-box;
            display: flex;
            background-color: #ffffff;
            position: relative;
            /* Thin, elegant Shogi board grid background */
            background-image: 
                linear-gradient(rgba(200, 200, 200, 0.15) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(200, 200, 200, 0.15) 1px, transparent 1px);
            background-size: 9.5mm 9.5mm;
            background-position: center;
            overflow: hidden;
        }

        /* Avoid margin on the 5th ticket per page */
        .ticket-container:nth-child(5n) {
            margin-bottom: 0;
        }

        /* Left Main Ticket */
        .ticket-main {
            width: 74%;
            height: 100%;
            border-right: 2px dashed #a1a1a1;
            padding: 5mm 6mm;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        /* Right Stub (半券) */
        .ticket-stub {
            width: 26%;
            height: 100%;
            padding: 5mm 4mm;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            background-color: rgba(254, 253, 249, 0.9);
        }

        /* Elegant Shogi style font */
        .shogi-font {
            font-family: 'Shippori Mincho', serif;
        }

        /* Traditional Japanese Hanko Stamp Style */
        .hanko-stamp {
            border: 2px solid #b91c1c;
            color: #b91c1c;
            font-family: 'Shippori Mincho', serif;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: inset 0 0 1px rgba(185, 28, 28, 0.2);
            /* Added slight grunge/traditional texture simulation */
            text-shadow: 0.5px 0.5px 0px rgba(185, 28, 28, 0.2);
            line-height: 1; /* Reset line-height to let flex alignment work perfectly */
        }

        /* Print Media Styles: hides UI entirely, outputs only A4 sheets */
        @media print {
            body {
                background-color: white;
                margin: 0;
                padding: 0;
            }
            .no-print {
                display: none !important;
            }
            .a4-page {
                box-shadow: none;
                margin: 0;
                padding: 15mm 10mm;
                width: 210mm;
                height: 297mm;
                page-break-after: always;
            }
            /* Make sure backgrounds print */
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- App Header & Navigation (Hidden on print) -->
    <header class="no-print bg-slate-900 text-white shadow-md p-4">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <span class="text-2xl">☖</span>
                <div>
                    <h1 class="text-lg font-bold leading-tight">将棋指導対局チケットジェネレーター</h1>
                    <p class="text-xs text-slate-400">A4ぴったり印刷・はんこ個別微調整版</p>
                </div>
            </div>
            <button onclick="window.print()" class="bg-red-600 hover:bg-red-700 active:bg-red-800 text-white font-semibold px-6 py-2.5 rounded-lg shadow-lg hover:shadow-xl transition-all flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-3a2 2 0 00-2-2H9a2 2 0 00-2 2v3a2 2 0 002 2zm0 0V9a2 2 0 012-2h6a2 2 0 012 2v10m-6-10a2 2 0 00-2 2v3a2 2 0 002 2h2a2 2 0 002-2v-3a2 2 0 00-2-2H9z" />
                </svg>
                印刷する / PDFに保存
            </button>
        </div>
    </header>

    <!-- Main Workspace (Hidden on print except for preview) -->
    <div class="flex-1 flex flex-col lg:flex-row max-w-7xl w-full mx-auto p-4 lg:p-6 gap-6">
        
        <!-- Controls Sidebar -->
        <aside class="no-print w-full lg:w-80 bg-white p-5 rounded-xl shadow-md border border-slate-200 self-start space-y-5">
            <h2 class="text-md font-bold text-slate-800 border-b border-slate-200 pb-2 flex items-center gap-2">
                <span class="text-red-600">⚙</span> 設定項目
            </h2>
            
            <!-- Ticket Info Controls -->
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">主タイトル（大文字）</label>
                    <input type="text" id="input-title" value="指導対局券" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">主催者名（上段）</label>
                    <input type="text" id="input-org" value="逢坂児童クラブ将棋連盟" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">代表者名（下段）</label>
                    <input type="text" id="input-president" value="会長 高倉英彦" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">はんこの文字</label>
                        <input type="text" id="input-stamp" value="高" maxlength="2" class="w-full px-3 py-2 border border-slate-300 rounded-md text-center focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">はんこのサイズ</label>
                        <select id="input-stamp-size" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                            <option value="small" selected>小さい (1/3サイズ)</option>
                            <option value="medium">普通</option>
                            <option value="large">大きい</option>
                        </select>
                    </div>
                </div>

                <!-- UPDATED: Dynamic Font Size Range Slider up to 4.0x -->
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="block text-xs font-semibold text-slate-600">はんこ内の文字の大きさ</label>
                        <span id="stamp-scale-val" class="text-xs font-semibold text-red-600 font-mono">1.0倍 (最小)</span>
                    </div>
                    <input type="range" id="input-stamp-font-scale" min="1.0" max="4.0" step="0.1" value="1.0" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-red-600">
                    <div class="flex justify-between text-[10px] text-slate-400 px-0.5 mt-0.5">
                        <span>標準(1.0倍)</span>
                        <span>中(2.5倍)</span>
                        <span>最大(4.0倍)</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 pt-2 border-t border-slate-100">
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">開始シリアル番号</label>
                        <input type="number" id="input-start-no" value="1" min="1" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">作成枚数</label>
                        <input type="number" id="input-count" value="10" min="1" max="50" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                </div>
            </div>

            <!-- Printing Advice -->
            <div class="bg-amber-50 border border-amber-200 text-amber-800 p-3.5 rounded-lg text-xs space-y-1.5">
                <p class="font-bold flex items-center gap-1">💡 綺麗に印刷するコツ</p>
                <ol class="list-decimal pl-4 space-y-1 text-slate-700">
                    <li>上の「印刷する」ボタンを押します。</li>
                    <li>印刷設定で、用紙サイズを <b>A4</b> に指定します。</li>
                    <li>余白設定を「<b>なし</b>」または「<b>最小</b>」にしてください。</li>
                    <li>「背景のグラフィック」の印刷設定に<b>チェックを入れて</b>ください。</li>
                </ol>
            </div>
        </aside>

        <!-- Live Preview Area -->
        <main class="flex-1 flex flex-col items-center overflow-auto bg-slate-200 p-4 rounded-xl border border-slate-300">
            <div class="no-print self-stretch flex items-center justify-between mb-4 px-2">
                <h3 class="text-sm font-semibold text-slate-700">A4印刷プレビュー（1枚に5つ配置）</h3>
                <span class="text-xs bg-slate-300 text-slate-800 px-2 py-1 rounded font-mono" id="page-count-badge">Page: 1/2</span>
            </div>
            
            <!-- This container holds actual A4 page sheets -->
            <div id="preview-pages-container" class="scale-90 md:scale-100 origin-top transition-transform duration-200">
                <!-- Pages will be rendered dynamically via Javascript -->
            </div>
        </main>

    </div>

    <!-- App Script & Rendering Logic -->
    <script>
        // DOM Elements
        const inputTitle = document.getElementById('input-title');
        const inputOrg = document.getElementById('input-org');
        const inputPresident = document.getElementById('input-president');
        const inputStamp = document.getElementById('input-stamp');
        const inputStampSize = document.getElementById('input-stamp-size');
        const inputStampFontScale = document.getElementById('input-stamp-font-scale');
        const stampScaleVal = document.getElementById('stamp-scale-val');
        const inputStartNo = document.getElementById('input-start-no');
        const inputCount = document.getElementById('input-count');
        const previewContainer = document.getElementById('preview-pages-container');
        const pageCountBadge = document.getElementById('page-count-badge');

        // Render tickets based on current input values
        function renderTickets() {
            // Read inputs
            const title = inputTitle.value || "指導対局券";
            const orgName = inputOrg.value || "逢坂児童クラブ将棋連盟";
            const presidentName = inputPresident.value || "会長 高倉英彦";
            const stampText = inputStamp.value || "高";
            const stampSizeOption = inputStampSize.value;
            const fontScale = parseFloat(inputStampFontScale.value) || 1.0;
            const startNo = parseInt(inputStartNo.value, 10) || 1;
            const totalCount = parseInt(inputCount.value, 10) || 10;

            // Display current scale in the sidebar UI
            stampScaleVal.textContent = `${fontScale.toFixed(1)}倍` + (fontScale === 1.0 ? ' (最小)' : '');

            // Base font sizing definitions in points (pt)
            let baseFontSize = 8;
            let baseStubFontSize = 7;

            // Determine Stamp dimensions (Hanko outer border container box)
            let stampClass = "w-[12mm] h-[12mm] border-[1.5px]"; // Small Default (1/3 size)
            let stubStampClass = "w-[10mm] h-[10mm] border-[1.2px]";
            
            if (stampSizeOption === "medium") {
                stampClass = "w-[18mm] h-[18mm] border-[2px]";
                stubStampClass = "w-[14mm] h-[14mm] border-[1.5px]";
                baseFontSize = 12;
                baseStubFontSize = 9;
            } else if (stampSizeOption === "large") {
                stampClass = "w-[24mm] h-[24mm] border-[2.5px]";
                stubStampClass = "w-[18mm] h-[18mm] border-[2px]";
                baseFontSize = 18;
                baseStubFontSize = 12;
            }

            // Calculate active font size with multiplier scale
            const mainStampFontSize = baseFontSize * fontScale;
            const stubStampFontSize = baseStubFontSize * fontScale;

            // Clear previous render
            previewContainer.innerHTML = '';

            const ticketsPerPage = 5;
            const totalPages = Math.ceil(totalCount / ticketsPerPage);
            pageCountBadge.textContent = `ページ数: ${totalPages}枚 (計${totalCount}枚)`;

            // Generate pages
            for (let pageIdx = 0; pageIdx < totalPages; pageIdx++) {
                const pageDiv = document.createElement('div');
                pageDiv.className = 'a4-page';
                
                // Add up to 5 tickets to this page
                const startTicketIdx = pageIdx * ticketsPerPage;
                const endTicketIdx = Math.min(startTicketIdx + ticketsPerPage, totalCount);

                for (let t = startTicketIdx; t < endTicketIdx; t++) {
                    const currentNoNum = startNo + t;
                    const formattedNo = "No." + String(currentNoNum).padStart(3, '0');

                    const ticketHTML = `
                        <div class="ticket-container">
                            <!-- Main Ticket (Left Side) -->
                            <div class="ticket-main">
                                <!-- Top Row: Serial Number -->
                                <div class="text-[#a32a2a] text-[13pt] font-extrabold font-serif tracking-wide select-none">
                                    ${formattedNo}
                                </div>
                                
                                <!-- Center Row: Large elegant title -->
                                <div class="text-center w-full z-10">
                                    <h2 class="shogi-font font-extrabold text-[28pt] text-slate-900 tracking-[0.25em] pl-[0.25em] select-none leading-none">
                                        ${title}
                                    </h2>
                                </div>
                                
                                <!-- Bottom Row: Issuer info & Hanko aligned side-by-side on the right -->
                                <div class="flex items-center justify-end gap-3 w-full mt-auto">
                                    <!-- Issuer Text (Stacked & aligned right) -->
                                    <div class="text-right flex flex-col justify-center leading-tight">
                                        <span class="shogi-font text-[9.5pt] font-semibold text-slate-700 tracking-wider">
                                            ${orgName}
                                        </span>
                                        <span class="shogi-font text-[12pt] font-bold text-slate-900 tracking-wide mt-0.5">
                                            ${presidentName}
                                        </span>
                                    </div>
                                    <!-- Elegant Red Hanko Seal with dynamic font-size -->
                                    <div class="hanko-stamp ${stampClass}" style="font-size: ${mainStampFontSize}pt;">
                                        ${stampText}
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Stub Ticket (Right Side) -->
                            <div class="ticket-stub">
                                <!-- Top Row: Stub Serial Number -->
                                <div class="text-[#a32a2a] text-[10.5pt] font-bold font-serif select-none">
                                    ${formattedNo}
                                </div>
                                
                                <!-- Stub Main Content -->
                                <div class="text-center mt-2">
                                    <div class="shogi-font font-bold text-[14pt] text-slate-800 leading-tight">
                                        ${title}
                                    </div>
                                    <div class="shogi-font font-semibold text-[11pt] text-slate-600 mt-0.5">
                                        半 券
                                    </div>
                                </div>
                                
                                <!-- Stub Footer (Recovery Note & Small Stamp aligned) -->
                                <div class="flex items-end justify-between w-full mt-auto">
                                    <span class="text-[7.5pt] text-slate-500 font-semibold mb-1 select-none">
                                        当日受付にて回収
                                    </span>
                                    <!-- Stub Hanko Seal with dynamic font-size -->
                                    <div class="hanko-stamp ${stubStampClass}" style="font-size: ${stubStampFontSize}pt;">
                                        ${stampText}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    pageDiv.innerHTML += ticketHTML;
                }

                previewContainer.appendChild(pageDiv);
            }
        }

        // Attach event listeners to render on input changes
        [
            inputTitle, inputOrg, inputPresident, 
            inputStamp, inputStampSize, inputStampFontScale, 
            inputStartNo, inputCount
        ].forEach(element => {
            element.addEventListener('input', renderTickets);
            element.addEventListener('change', renderTickets);
        });

        // Initialize first render
        window.onload = function() {
            renderTickets();
        };
    </script>
</body>
</html>
